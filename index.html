<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMP581 Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #f7f8fb;
            --panel: rgba(255, 255, 255, 0.88);
            --text: #1f2430;
            --muted: #768197;
            --line: #e7eaf0;
            --blue: #1677ff;
            --blue-soft: rgba(22, 119, 255, 0.12);
            --red: #ef4444;
            --btn: #f1f3f7;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .page {
            max-width: 1240px;
            margin: 0 auto;
            padding: 28px 24px 32px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 650;
        }

        .status {
            border-radius: 999px;
            padding: 8px 16px;
            background: #e9eef6;
            color: var(--muted);
            font-size: 14px;
            font-weight: 600;
        }

        .status.connected {
            background: #e8f1ff;
            color: var(--blue);
        }

        .layout {
            display: grid;
            grid-template-columns: 320px minmax(0, 1fr);
            gap: 24px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(18, 32, 59, 0.06);
            backdrop-filter: blur(12px);
            padding: 24px;
        }

        .left {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .btn {
            appearance: none;
            border: none;
            border-radius: 12px;
            padding: 14px 18px;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: var(--btn);
            color: var(--text);
        }

        .btn:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        .btn-primary {
            background: var(--blue);
            color: #fff;
        }

        .btn-danger {
            background: #feeceb;
            color: var(--red);
        }

        .mini {
            display: grid;
            gap: 8px;
            padding: 14px 16px;
            border-radius: 14px;
            background: rgba(15, 23, 42, 0.03);
            color: var(--muted);
            font-size: 14px;
        }

        .pressure {
            padding: 22px 0 10px;
            border-bottom: 1px solid var(--line);
            margin-bottom: 10px;
            text-align: center;
        }

        .pressure-label {
            color: var(--muted);
            font-size: 14px;
            font-weight: 600;
        }

        .pressure-value {
            margin: 14px 0 10px;
            font-size: 64px;
            line-height: 1;
            font-weight: 700;
            letter-spacing: 0;
            font-variant-numeric: tabular-nums;
        }

        .pressure-meta {
            color: var(--muted);
            font-size: 14px;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .main {
            display: grid;
            gap: 24px;
        }

        .section-title {
            margin: 0 0 14px;
            color: var(--muted);
            font-size: 14px;
            font-weight: 700;
        }

        .chart-wrap {
            height: 420px;
        }

        .log {
            height: 220px;
            overflow-y: auto;
            border-radius: 14px;
            background: #161b22;
            color: #d7dde7;
            padding: 14px 16px;
            font: 13px/1.55 Consolas, "SFMono-Regular", monospace;
        }

        .log span {
            color: #72a7ff;
        }

        @media (max-width: 980px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="page">
    <div class="header">
        <h1>BMP581 Monitor</h1>
        <div id="statusBadge" class="status">Disconnected</div>
    </div>

    <div class="layout">
        <div class="panel left">
            <button id="btnConnect" class="btn btn-primary">连接设备</button>
            <button id="btnDisconnect" class="btn" style="display:none;">断开连接</button>

            <div class="mini">
                <div>初始化状态: <strong id="initStatus">未初始化</strong></div>
                <div>采样率: <strong id="sampleRate">--</strong></div>
                <div>量程: <strong id="rangeValue">--</strong></div>
            </div>

            <div class="pressure">
                <div class="pressure-label">即时大气压力</div>
                <div id="pressureValue" class="pressure-value">--</div>
                <div class="pressure-meta">Pa | 传感器状态: <strong id="sensorStatus">未知</strong></div>
            </div>

            <div class="controls">
                <button id="btnStart" class="btn btn-primary" disabled>开始(S)</button>
                <button id="btnPause" class="btn btn-danger" disabled>暂停(P)</button>
                <button id="btnCheck" class="btn" disabled>自查(C)</button>
            </div>
        </div>

        <div class="panel main">
            <div>
                <div class="section-title">压力趋势图</div>
                <div class="chart-wrap">
                    <canvas id="pressureChart"></canvas>
                </div>
            </div>

            <div>
                <div class="section-title">设备日志</div>
                <div id="terminal" class="log"></div>
            </div>
        </div>
    </div>
</div>

<script>
const NUS_SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
const NUS_RX_CHAR_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
const NUS_TX_CHAR_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

const MAX_DATA_POINTS = 500;
const MIN_VALID_PRESSURE_PA = 30000;
const MAX_VALID_PRESSURE_PA = 125000;
const MAX_PRESSURE_STEP_PA = 5000;

let bleDevice = null;
let rxCharacteristic = null;
let txCharacteristic = null;
let rxBuffer = "";
let lastAcceptedPressure = null;
let sampleIndex = 0;

const btnConnect = document.getElementById("btnConnect");
const btnDisconnect = document.getElementById("btnDisconnect");
const btnStart = document.getElementById("btnStart");
const btnPause = document.getElementById("btnPause");
const btnCheck = document.getElementById("btnCheck");
const statusBadge = document.getElementById("statusBadge");
const pressureValue = document.getElementById("pressureValue");
const sensorStatus = document.getElementById("sensorStatus");
const initStatus = document.getElementById("initStatus");
const sampleRate = document.getElementById("sampleRate");
const rangeValue = document.getElementById("rangeValue");
const terminal = document.getElementById("terminal");

function log(message) {
    const time = new Date().toLocaleTimeString();
    terminal.innerHTML += `<span>[${time}]</span> ${message}<br>`;
    terminal.scrollTop = terminal.scrollHeight;
}

function resetChart() {
    sampleIndex = 0;
    lastAcceptedPressure = null;
    chart.data.labels = [];
    chart.data.datasets[0].data = [];
    chart.update("none");
}

function setDisconnectedState() {
    statusBadge.textContent = "Disconnected";
    statusBadge.classList.remove("connected");
    btnConnect.style.display = "block";
    btnDisconnect.style.display = "none";
    btnStart.disabled = true;
    btnPause.disabled = true;
    btnCheck.disabled = true;
    initStatus.textContent = "未初始化";
    initStatus.style.color = "";
    sampleRate.textContent = "--";
    rangeValue.textContent = "--";
    sensorStatus.textContent = "未知";
    sensorStatus.style.color = "";
    rxBuffer = "";
    resetChart();
}

const ctx = document.getElementById("pressureChart").getContext("2d");
const chart = new Chart(ctx, {
    type: "line",
    data: {
        labels: [],
        datasets: [{
            label: "Pressure (Pa)",
            data: [],
            borderColor: "#1677ff",
            backgroundColor: "rgba(22, 119, 255, 0.12)",
            borderWidth: 2,
            pointRadius: 0,
            fill: true,
            tension: 0
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        plugins: {
            legend: { display: false }
        },
        scales: {
            x: { display: false },
            y: {
                grid: { color: "#eef2f7" },
                ticks: { color: "#768197" }
            }
        }
    }
});

btnConnect.addEventListener("click", async () => {
    try {
        log("Requesting Bluetooth device...");
        bleDevice = await navigator.bluetooth.requestDevice({
            filters: [{ namePrefix: "JingQi" }],
            optionalServices: [NUS_SERVICE_UUID]
        });

        bleDevice.addEventListener("gattserverdisconnected", onDisconnected);

        log("Connecting GATT server...");
        const server = await bleDevice.gatt.connect();

        log("Getting NUS service...");
        const service = await server.getPrimaryService(NUS_SERVICE_UUID);

        log("Configuring characteristics...");
        rxCharacteristic = await service.getCharacteristic(NUS_RX_CHAR_UUID);
        txCharacteristic = await service.getCharacteristic(NUS_TX_CHAR_UUID);

        await txCharacteristic.startNotifications();
        txCharacteristic.addEventListener("characteristicvaluechanged", handleNotifications);

        statusBadge.textContent = "Connected";
        statusBadge.classList.add("connected");
        btnConnect.style.display = "none";
        btnDisconnect.style.display = "block";
        btnStart.disabled = false;
        btnPause.disabled = false;
        btnCheck.disabled = false;

        log("Connected. Waiting for device data...");
    } catch (error) {
        log("Connect failed: " + error);
    }
});

btnDisconnect.addEventListener("click", () => {
    if (bleDevice && bleDevice.gatt.connected) {
        bleDevice.gatt.disconnect();
    }
});

function onDisconnected() {
    setDisconnectedState();
    log("Device disconnected.");
}

function expandPressurePayload(payload) {
    if (payload.includes("|S:")) {
        const parts = payload.split("|S:");
        const statusStr = (parts[1] || "").trim();
        if (statusStr === "1") {
            sensorStatus.textContent = "OK";
            sensorStatus.style.color = "#1677ff";
        } else {
            sensorStatus.textContent = "Error";
            sensorStatus.style.color = "#ef4444";
        }
        return parts[0].replace("B:", "").split(",");
    }

    const compact = payload.replace("B:", "");
    const compactParts = compact.split(";");
    const baseValue = parseFloat(compactParts[0]);
    const values = [];

    if (!isNaN(baseValue)) {
        values.push(baseValue);
    }

    if (compactParts.length > 1 && compactParts[1].trim() !== "") {
        const deltas = compactParts[1].split(",");
        for (const deltaStr of deltas) {
            const delta = parseFloat(deltaStr);
            if (!isNaN(delta) && !isNaN(baseValue)) {
                values.push(baseValue + delta);
            }
        }
    }

    sensorStatus.textContent = "OK";
    sensorStatus.style.color = "#1677ff";
    return values;
}

function appendPressurePoints(values) {
    let lastValidPressure = null;

    for (const raw of values) {
        const pressureNum = typeof raw === "number" ? raw : parseFloat(raw);
        const inRange = !isNaN(pressureNum) &&
            pressureNum >= MIN_VALID_PRESSURE_PA &&
            pressureNum <= MAX_VALID_PRESSURE_PA;
        const smoothEnough = lastAcceptedPressure === null ||
            Math.abs(pressureNum - lastAcceptedPressure) <= MAX_PRESSURE_STEP_PA;

        if (inRange && smoothEnough) {
            lastValidPressure = pressureNum;
            lastAcceptedPressure = pressureNum;
            chart.data.labels.push(sampleIndex++);
            chart.data.datasets[0].data.push(pressureNum);
        }
    }

    while (chart.data.labels.length > MAX_DATA_POINTS) {
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
    }

    if (lastValidPressure !== null) {
        pressureValue.textContent = lastValidPressure.toFixed(2);
        chart.update("none");
    }
}

function handleNotifications(event) {
    const value = new TextDecoder().decode(event.target.value);
    rxBuffer += value;

    const lines = rxBuffer.split("\n");
    rxBuffer = lines.pop();

    for (let line of lines) {
        line = line.trim();
        if (!line) continue;

        log("Rx: " + line);

        if (line.startsWith("INIT:OK")) {
            initStatus.textContent = "成功";
            initStatus.style.color = "#1677ff";
            continue;
        }

        if (line.startsWith("INIT:FAIL")) {
            initStatus.textContent = "失败";
            initStatus.style.color = "#ef4444";
            sampleRate.textContent = "--";
            rangeValue.textContent = "--";
            continue;
        }

        if (line.startsWith("SR:")) {
            sampleRate.textContent = line.replace("SR:", "").trim();
            continue;
        }

        if (line.startsWith("RNG:")) {
            rangeValue.textContent = line.replace("RNG:", "").trim();
            continue;
        }

        if (line === "READY") {
            log("Device ready.");
            continue;
        }

        if (line.startsWith("CMD:")) {
            log("Command list: " + line.replace("CMD:", "").trim());
            continue;
        }

        if (line.startsWith("IIC:") || line.startsWith("BMP:")) {
            log("Check: " + line);
            continue;
        }

        if (line.startsWith("B:")) {
            appendPressurePoints(expandPressurePayload(line));
        }
    }
}

async function sendCommand(cmd) {
    if (!rxCharacteristic) return;
    try {
        const encoder = new TextEncoder();
        await rxCharacteristic.writeValue(encoder.encode(cmd));
        log("Tx: " + cmd);
    } catch (error) {
        log("Send failed: " + error);
    }
}

btnStart.addEventListener("click", () => sendCommand("S"));
btnPause.addEventListener("click", () => sendCommand("P"));
btnCheck.addEventListener("click", () => sendCommand("C"));

setDisconnectedState();
</script>
</body>
</html>
